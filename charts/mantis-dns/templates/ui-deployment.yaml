apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mantis-dns.fullname" . }}-ui
  labels:
    {{- include "mantis-dns.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mantis-dns.fullname" . }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mantis-dns.fullname" . }}
        app.kubernetes.io/component: ui
    spec:
      containers:
        - name: ui
          image: "{{ .Values.image.registry }}-ui:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Not forcing runAsNonRoot here: nginx's master process needs to
          # bind port 80 and this image (upstream nginx:alpine) doesn't ship
          # a non-root USER, so guessing a runAsUser could break the pod on
          # a base-image bump. Dropping every other capability and blocking
          # privilege escalation still meaningfully narrows what a container
          # compromise could do, without touching how it starts.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - containerPort: {{ .Values.ui.port }}
          env:
            - name: CONTROL_UPSTREAM
              value: "{{ include "mantis-dns.fullname" . }}-control:{{ .Values.control.port }}"
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.ui.port }}
