{{- if .Values.ingress.enabled }}
{{- if and (not .Values.ingress.tls.enabled) (not .Values.ingress.allowInsecure) }}
{{- fail "ingress.enabled is true but ingress.tls.enabled is false: this would serve the admin UI (session cookie + CSRF token) over plaintext HTTP. Set ingress.tls.enabled=true with a valid secretName, or ingress.allowInsecure=true to acknowledge this is intentional (e.g. a purely internal ingress)." }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mantis-dns.fullname" . }}
  labels:
    {{- include "mantis-dns.labels" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mantis-dns.fullname" . }}-ui
                port:
                  number: {{ .Values.ui.port }}
{{- end }}
