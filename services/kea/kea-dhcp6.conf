{
    "Dhcp6": {
        "interfaces-config": {
            "interfaces": ["*"]
        },
        "lease-database": {
            "type": "postgresql",
            "name": "__PG_DB__",
            "host": "__PG_HOST__",
            "port": __PG_PORT__,
            "user": "__PG_USER__",
            "password": "__PG_PASS__"
        },
        "control-sockets": [
            {
                "socket-type": "http",
                "socket-address": "__KEA_CTRL_BIND_ADDRESS__",
                "socket-port": __KEA6_CTRL_PORT__
            },
            {
                "socket-type": "unix",
                "socket-name": "/run/kea/kea6-ctrl-socket"
            }
        ],
        "expired-leases-processing": {
            "reclaim-timer-wait-time": 10,
            "flush-reclaimed-timer-wait-time": 25,
            "hold-reclaimed-time": 3600,
            "max-reclaim-leases": 100,
            "max-reclaim-time": 250
        },
        "preferred-lifetime": 3000,
        "valid-lifetime": 4000,
        "renew-timer": 1000,
        "rebind-timer": 2000,
        "subnet6": [],
        "loggers": [
            {
                "name": "kea-dhcp6",
                "output_options": [
                    {
                        "output": "stdout",
                        "pattern": "%-5p %m\n"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
