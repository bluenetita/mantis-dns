{
    "Dhcp4": {
        "interfaces-config": {
            "interfaces": ["*"],
            "dhcp-socket-type": "udp"
        },
        "lease-database": {
            "type": "postgresql",
            "name": "__PG_DB__",
            "host": "__PG_HOST__",
            "port": __PG_PORT__,
            "user": "__PG_USER__",
            "password": "__PG_PASS__"
        },
        "control-socket": {
            "socket-type": "unix",
            "socket-name": "/run/kea/kea4-ctrl-socket"
        },
        "expired-leases-processing": {
            "reclaim-timer-wait-time": 10,
            "flush-reclaimed-timer-wait-time": 25,
            "hold-reclaimed-time": 3600,
            "max-reclaim-leases": 100,
            "max-reclaim-time": 250
        },
        "hooks-libraries": __HOOKS_LIBRARIES__,
        "valid-lifetime": 86400,
        "renew-timer": 43200,
        "rebind-timer": 75600,
        "subnet4": [],
        "loggers": [
            {
                "name": "kea-dhcp4",
                "output_options": [
                    {
                        "output": "stdout",
                        "pattern": "%-5p %m\n"
                    }
                ],
                "severity": "INFO"
            }
        ]
    }
}
