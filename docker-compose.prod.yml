# Production overlay: pulls published images instead of building from source,
# and drops the dev conveniences (source mounts, Vite dev server, exposed
# non-standard ports). Requires every secret in .env.example to be set to a
# strong value — MANTIS_ENV=production makes the control plane refuse to boot
# otherwise.
#
# Usage:
#   IMAGE_PREFIX=ghcr.io/<you>/mantis-dns MANTIS_VERSION=v0.1.0 \
#     docker compose -f docker-compose.prod.yml up -d
#
# Or bake IMAGE_PREFIX / MANTIS_VERSION into .env instead of passing them
# inline. Images are published as <IMAGE_PREFIX>-<service>:<MANTIS_VERSION>
# by .github/workflows/release.yml on every `v*` tag.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantis"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  control:
    image: ${IMAGE_PREFIX:-ghcr.io/mantis-dns/mantis-dns}-control:${MANTIS_VERSION:-latest}
    ports:
      # Loopback-only escape hatch for local operations; public traffic should
      # enter through the UI/nginx proxy so API docs/schema are not exposed
      # directly and all browser traffic stays same-origin.
      - "127.0.0.1:8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MANTIS_ENV=production
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-mantis}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-mantis}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:?set to your UI origin(s), e.g. https://dns.example.com}
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:?required}
      - MANTIS_SERVICE_TOKEN=${MANTIS_SERVICE_TOKEN:?required}
      - MANTIS_JWT_SECRET=${MANTIS_JWT_SECRET:?required}
      - MANTIS_WEBHOOK_SECRET_KEY=${MANTIS_WEBHOOK_SECRET_KEY:?required}
      - MANTIS_FILTER_NODE_IP=${MANTIS_FILTER_NODE_IP:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mantis.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?required}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
      # Must be absolute paths on a volume that survives container
      # recreation (a new image on `docker compose up -d` gets a fresh
      # writable layer otherwise) — MANTIS_ENV=production refuses to boot
      # if any of these resolve as relative. See config.py's
      # _check_production_secrets for what silently breaks without this:
      # the signing key regenerates unnoticed, and/or feed_domains/bundles
      # go empty while the DB still thinks every feed is ingested, so
      # compiled bundles silently stop blocking anything.
      - MANTIS_SIGNING_KEY_PATH=/data/signing_key.bin
      - FEED_STORAGE_DIR=/data/feed_domains
      - BUNDLE_STORAGE_DIR=/data/bundles
    volumes:
      - control-data:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    image: ${IMAGE_PREFIX:-ghcr.io/mantis-dns/mantis-dns}-ui:${MANTIS_VERSION:-latest}
    ports:
      - "80:80"
    environment:
      - CONTROL_UPSTREAM=control:8000
    restart: unless-stopped
    depends_on:
      - control

  filter:
    image: ${IMAGE_PREFIX:-ghcr.io/mantis-dns/mantis-dns}-filter:${MANTIS_VERSION:-latest}
    ports:
      - "53:1053/udp"
      - "53:1053/tcp"
      # Block-page HTTP listener (docs/design-block-page.md). Harmless to
      # publish even when unused: the filter only binds this port inside the
      # container when BLOCKPAGE_BIND_ADDR is set below, so it's a closed
      # connection (not an open one) until a policy opts in via redirect mode.
      - "${BLOCKPAGE_PUBLISH_PORT:-8080}:8080/tcp"
    environment:
      - RUST_LOG=info
      - CONTROL_URL=http://control:8000
      - GROUP_ID=${GROUP_ID:-}
      - DNS_BIND_ADDR=0.0.0.0:1053
      - MANTIS_SERVICE_TOKEN=${MANTIS_SERVICE_TOKEN:?required}
      - MANTIS_CONTROL_PUBLIC_KEY_SHA256=${MANTIS_CONTROL_PUBLIC_KEY_SHA256:-}
      - BLOCKPAGE_BIND_ADDR=${BLOCKPAGE_BIND_ADDR:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    depends_on:
      - control

  dhcp:
    image: ${IMAGE_PREFIX:-ghcr.io/mantis-dns/mantis-dns}-dhcp:${MANTIS_VERSION:-latest}
    # Host networking: DHCP replies to un-addressed clients are broadcast
    # (see design.md §22.1) and need the real host L2/broadcast domain, which
    # Docker's bridge network doesn't forward. HA is running a second `dhcp`
    # instance on a *separate host* against the same Postgres — not a second
    # container here, since only one process per host can bind :67 in host
    # networking mode. Allocation is a DB-locked transaction, so that's all
    # active/active HA needs; there's no peer config.
    network_mode: host
    # Opt-in: `docker compose -f docker-compose.prod.yml --profile dhcp up -d`.
    # Left out of the default `up` (what scripts/bootstrap.sh --prod runs)
    # because it needs MANTIS_DHCP_SERVER_IP set to a real host interface
    # address and host networking — neither is a sane default.
    profiles:
      - dhcp
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mantis}:${POSTGRES_PASSWORD:?required}@localhost:5432/${POSTGRES_DB:-mantis}
      - MANTIS_CTRL_URL=http://localhost:8000
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:?required}
      - MANTIS_FILTER_NODE_IP=${MANTIS_FILTER_NODE_IP:-}
      # mantis-dhcp itself refuses to start without this — see the comment
      # in docker-compose.yml for why it isn't `:?required` here.
      - MANTIS_DHCP_SERVER_IP=${MANTIS_DHCP_SERVER_IP:-}
      - MANTIS_DHCP_METRICS_BIND_ADDR=${MANTIS_DHCP_METRICS_BIND_ADDR:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      control:
        condition: service_started
    # Binds :67 as a non-root user (see services/dhcp/Dockerfile's setcap).
    # NET_RAW here is only for SO_BINDTODEVICE (per-interface dispatch) —
    # still no AF_PACKET/raw-socket packet crafting (see server.rs's docs).
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW

  # DHCPv6 (design.md §22.9) — same image, entrypoint override (see docker-compose.yml).
  dhcp6:
    image: ${IMAGE_PREFIX:-ghcr.io/mantis-dns/mantis-dns}-dhcp:${MANTIS_VERSION:-latest}
    entrypoint: ["/usr/local/bin/mantis-dhcp6"]
    network_mode: host
    profiles:
      - dhcp6
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgresql://${POSTGRES_USER:-mantis}:${POSTGRES_PASSWORD:?required}@localhost:5432/${POSTGRES_DB:-mantis}
      - MANTIS_CTRL_URL=http://localhost:8000
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:?required}
      # mantis-dhcp6 refuses to start without this — see the comment in
      # docker-compose.yml for why it isn't `:?required` here.
      - MANTIS_DHCP6_SERVER_ID=${MANTIS_DHCP6_SERVER_ID:-}
      - MANTIS_DHCP6_METRICS_BIND_ADDR=${MANTIS_DHCP6_METRICS_BIND_ADDR:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      control:
        condition: service_started
    # Binds :547 as a non-root user. No CAP_NET_RAW needed (see dockerfile/docker-compose.yml).
    cap_add:
      - NET_BIND_SERVICE

volumes:
  pgdata:
  control-data:
