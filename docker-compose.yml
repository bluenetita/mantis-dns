services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  control:
    build:
      context: .
      dockerfile: services/control/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/control:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://aegis:aegis@postgres:5432/aegis
    depends_on:
      postgres:
        condition: service_healthy

  ui:
    build:
      context: apps/ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/ui:/app
      - /app/node_modules
    depends_on:
      - control

  filter:
    build:
      context: .
      dockerfile: services/filter/Dockerfile
    ports:
      - "1053:1053/udp"
      - "9090:9090"
    environment:
      - RUST_LOG=info
      - CONTROL_URL=http://control:8000
      - GROUP_ID=${GROUP_ID:-}
      - DNS_BIND_ADDR=0.0.0.0:1053
      - METRICS_BIND_ADDR=0.0.0.0:9090
    depends_on:
      - control

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - filter

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - prometheus

volumes:
  pgdata:
