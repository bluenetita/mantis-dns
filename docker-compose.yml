services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 3s
      retries: 10

  control:
    build:
      context: .
      dockerfile: services/control/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/control:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://aegis:aegis@postgres:5432/aegis
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:59144
      - KEA_CTRL_URL=http://kea:8080/
      - KEA6_CTRL_URL=http://kea:8080/
      - AEGIS_INTERNAL_TOKEN=${AEGIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - AEGIS_SERVICE_TOKEN=${AEGIS_SERVICE_TOKEN:-}
      - AEGIS_FILTER_NODE_IP=${AEGIS_FILTER_NODE_IP:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis
    depends_on:
      postgres:
        condition: service_healthy
      kea:
        condition: service_started

  ui:
    build:
      context: apps/ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/ui:/app
      - /app/node_modules
    depends_on:
      - control

  filter:
    build:
      context: .
      dockerfile: services/filter/Dockerfile
    ports:
      - "1053:1053/udp"
    environment:
      - RUST_LOG=info
      - CONTROL_URL=http://control:8000
      - GROUP_ID=${GROUP_ID:-}
      - DNS_BIND_ADDR=0.0.0.0:1053
      - AEGIS_SERVICE_TOKEN=${AEGIS_SERVICE_TOKEN:-}
    depends_on:
      - control

  kea:
    build:
      context: services/kea
      dockerfile: Dockerfile
    ports:
      - "8080:8080"    # Kea Control Agent REST API
      - "67:67/udp"    # DHCPv4
      - "547:547/udp"  # DHCPv6
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis
      - AEGIS_CTRL_URL=http://control:8000
      - AEGIS_INTERNAL_TOKEN=${AEGIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - KEA_ROLE=primary
      - KEA_PEER_URL=http://kea-secondary:8080/
    volumes:
      - kea-primary-run:/run/kea
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_ADMIN

  kea-secondary:
    build:
      context: services/kea
      dockerfile: Dockerfile
    ports:
      - "8081:8080"    # Kea Control Agent REST API (secondary)
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=aegis
      - POSTGRES_PASSWORD=aegis
      - POSTGRES_DB=aegis
      - AEGIS_CTRL_URL=http://control:8000
      - AEGIS_INTERNAL_TOKEN=${AEGIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - KEA_ROLE=secondary
      - KEA_PEER_URL=http://kea:8080/
    volumes:
      - kea-secondary-run:/run/kea
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    profiles:
      - ha   # opt-in: `docker compose --profile ha up`


volumes:
  pgdata:
  kea-primary-run:
  kea-secondary-run:
