services:
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mantis}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
    # No host port publish — only reached by other containers on the compose
    # network (service name `postgres`). Use `docker compose exec postgres
    # psql ...` for local inspection instead of exposing 5432 to the host.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantis"]
      interval: 5s
      timeout: 3s
      retries: 10

  control:
    build:
      context: .
      dockerfile: services/control/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/control:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER:-mantis}:${POSTGRES_PASSWORD:-mantis}@postgres:5432/${POSTGRES_DB:-mantis}
      - CORS_ALLOW_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:59144
      - KEA_CTRL_URL=http://kea:8004/
      - KEA4_CTRL_URL=http://kea:8004/
      - KEA6_CTRL_URL=http://kea:8006/
      # Must be the real (non-symlink) hooks dir Debian's isc-kea-hooks
      # package installs to inside the kea image — Kea 3.x rejects
      # hooks-libraries paths that resolve through a symlink. The kea
      # image's /usr/lib/kea/hooks is a convenience symlink to this real
      # path; only override if the kea image is built for a different arch
      # (the triplet varies, e.g. aarch64-linux-gnu on arm64 hosts).
      - KEA_HOOKS_DIR=${KEA_HOOKS_DIR:-/usr/lib/x86_64-linux-gnu/kea/hooks}
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - MANTIS_SERVICE_TOKEN=${MANTIS_SERVICE_TOKEN:-}
      - MANTIS_FILTER_NODE_IP=${MANTIS_FILTER_NODE_IP:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mantis}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kea:
        condition: service_started

  ui:
    build:
      context: apps/ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/ui:/app
      - /app/node_modules
    depends_on:
      - control

  filter:
    build:
      context: .
      dockerfile: services/filter/Dockerfile
    ports:
      - "1053:1053/udp"
      - "1053:1053/tcp"
      - "${BLOCKPAGE_PUBLISH_PORT:-8080}:8080/tcp"
    environment:
      - RUST_LOG=info
      - CONTROL_URL=http://control:8000
      - GROUP_ID=${GROUP_ID:-}
      - DNS_BIND_ADDR=0.0.0.0:1053
      - MANTIS_SERVICE_TOKEN=${MANTIS_SERVICE_TOKEN:-}
      - MANTIS_CONTROL_PUBLIC_KEY_SHA256=${MANTIS_CONTROL_PUBLIC_KEY_SHA256:-}
      - UPSTREAM_BUNDLE_TENANT=${UPSTREAM_BUNDLE_TENANT:-*}
      # Co-hosted block-page HTTP listener (docs/design-block-page.md). Only
      # started when set (blank = disabled, matching mantis-filter's own
      # opt-in default); a policy using BLOCK_MODE_REDIRECT should point its
      # redirect_ipv4/6 at wherever this port is reachable from clients.
      - BLOCKPAGE_BIND_ADDR=${BLOCKPAGE_BIND_ADDR:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    depends_on:
      - control

  kea:
    build:
      context: services/kea
      dockerfile: Dockerfile
    ports:
      - "67:67/udp"    # DHCPv4
      - "547:547/udp"  # DHCPv6
      # Direct Kea management HTTP sockets. Bound to loopback by default so a
      # native/LXC control plane on the same host can reach them without
      # exposing config-write APIs to the LAN. Set KEA_CTRL_PUBLISH_ADDR to a
      # specific management IP when the control plane runs on another host.
      - "${KEA_CTRL_PUBLISH_ADDR:-127.0.0.1}:8004:8004"
      - "${KEA_CTRL_PUBLISH_ADDR:-127.0.0.1}:8006:8006"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mantis}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
      - MANTIS_CTRL_URL=http://control:8000
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - KEA_ROLE=primary
      - KEA_PEER_URL=http://kea-secondary:8004/
    restart: unless-stopped
    volumes:
      - kea-primary-run:/var/run/kea
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_ADMIN

  kea-secondary:
    build:
      context: services/kea
      dockerfile: Dockerfile
    # Kea management HTTP sockets are deliberately not published — same
    # reasoning as the primary `kea` service above.
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-mantis}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mantis}
      - POSTGRES_DB=${POSTGRES_DB:-mantis}
      - MANTIS_CTRL_URL=http://control:8000
      - MANTIS_INTERNAL_TOKEN=${MANTIS_INTERNAL_TOKEN:-dev-insecure-internal-token}
      - KEA_ROLE=secondary
      - KEA_PEER_URL=http://kea:8004/
    volumes:
      - kea-secondary-run:/var/run/kea
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    profiles:
      - ha   # opt-in: `docker compose --profile ha up`


volumes:
  pgdata:
  kea-primary-run:
  kea-secondary-run:
