# nfpm config for the aegis-filter edge package. Built by
# .github/workflows/release.yml (BIN_PATH and VERSION are set there); to
# build locally:
#
#   cargo build --release -p aegis-filter --target x86_64-unknown-linux-musl
#   BIN_PATH=target/x86_64-unknown-linux-musl/release/aegis-filter \
#   VERSION=0.1.0 nfpm package -f packaging/filter/nfpm.yaml -p deb -t .
name: aegis-filter
version: ${VERSION}
arch: ${ARCH}
platform: linux
section: net
priority: optional
maintainer: Aegis-DNS
description: |
  Aegis-DNS filter node — DNS resolver enforcing policy bundles pulled from
  an Aegis-DNS control plane. Standalone edge deployment (no Docker/Python/
  Node required).
homepage: https://github.com/aegis-dns/aegis-dns
license: Proprietary

contents:
  - src: ${BIN_PATH}
    dst: /usr/bin/aegis-filter
    file_info:
      mode: 0755
  - src: ./aegis-filter.service
    dst: /lib/systemd/system/aegis-filter.service
  - src: ./aegis-filter.env
    dst: /etc/aegis-filter/aegis-filter.env
    type: config|noreplace

scripts:
  postinstall: ./postinstall.sh
  preremove: ./preremove.sh
